name: BeastGPT Shorts Streamer

on:
  workflow_dispatch: # Manual Start Button

jobs:
  stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install Weapons (Node, Xvfb, FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg
          # Install Chrome manually for stability
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install ./google-chrome-stable_current_amd64.deb -y

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install Bot Modules
        run: |
          npm init -y
          npm install mineflayer prismarine-viewer

      - name: Execute BeastGPT Stream Protocol
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
        run: |
          chmod +x stream.sh
          ./stream.sh
