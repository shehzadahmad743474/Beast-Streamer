name: BeastGPT Global Matrix Station

on:
  push:
  schedule:
    - cron: "0 */5 * * *" 
  workflow_dispatch:      

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Weapons
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg wget google-chrome-stable

      - name: Install Python Weapons
        run: |
          pip install selenium pytchat webdriver-manager

      - name: Download Matrix BGM
        run: |
          wget -qO bgm.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3"

      - name: Run The Beast Engine
        run: |
          xvfb-run -a -n 99 -s "-screen 0 1080x1920x24" python main.py
