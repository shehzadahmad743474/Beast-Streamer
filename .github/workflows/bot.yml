name: BeastGPT 24/7 Streamer

on:
  workflow_dispatch:   # Button se manually chalu karne ke liye
  schedule:
    - cron: "0 */5 * * *"  # Har 5 ghante mein auto-restart taaki server band na ho

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg & Python Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install pytchat requests

      - name: Run The Beast Engine
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          VIDEO_ID: ${{ secrets.VIDEO_ID }}
        run: |
          python main.py
