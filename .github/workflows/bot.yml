name: BeastGPT 24/7 Streamer

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *" 

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg & Python Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install pytchat requests

      - name: Run The Beast Engine
        env:
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          VIDEO_ID: ${{ secrets.VIDEO_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}  # Ye nayi line hai!
        run: |
          python main.py
