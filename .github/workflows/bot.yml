name: BeastGPT Queue Stream

on:
  push:
  schedule:
    - cron: "0 */5 * * *" 
  workflow_dispatch:      

jobs:
  stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Weapons
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install pytchat

      - name: Run The Beast Engine
        run: python main.py
