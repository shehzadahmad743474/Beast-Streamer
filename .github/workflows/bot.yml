name: BeastGPT Interactive Live

on:
  push:
  schedule:
    - cron: "0 */5 * * *"  # Auto-restart every 5 hours (GitHub limit 6 hours)
  workflow_dispatch:      # Manual Start button

jobs:
  stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Weapons (FFmpeg & Libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp pytchat

      - name: Run The Beast Engine
        run: python main.py
