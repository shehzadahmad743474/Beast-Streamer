name: BeastGPT Virtual Screen Stream

on:
  push:
  schedule:
    - cron: "0 */5 * * *" 
  workflow_dispatch:      

jobs:
  stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Weapons (Virtual Screen & FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg fluxbox wget

      - name: Install Python Weapons
        run: |
          pip install selenium pytchat webdriver-manager

      - name: Download Unblockable BGM
        # Beast Bypass: Downloading directly from an open audio server (No 403, No Bot Check)
        run: |
          wget -qO bgm.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"

      - name: Run The Beast Virtual Engine
        # Creating a 1080x1920 virtual screen for shorts feed
        run: |
          xvfb-run -a -n 99 -s "-screen 0 1080x1920x24" python main.py
