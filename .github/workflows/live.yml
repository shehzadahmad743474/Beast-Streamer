name: BeastGPT Shorts Streamer

on:
  workflow_dispatch: # Manual Start Button

jobs:
  stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install Heavy Weapons & Graphics Engines
        run: |
          sudo apt-get update
          # Install Virtual Screen, FFmpeg, and Canvas Build Tools
          sudo apt-get install -y xvfb ffmpeg build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
          
          # Install Chrome manually for stability
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install ./google-chrome-stable_current_amd64.deb -y

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install Bot Modules (With Canvas)
        run: |
          npm init -y
          # Canvas is strictly required for 3D rendering on Headless Linux
          npm install canvas mineflayer prismarine-viewer

      - name: Execute BeastGPT Stream Protocol
        env:
          # YE SECRET TERI REPO SETTINGS MEIN HONA CHAHIYE
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
        run: |
          # Agar key nahi hai toh script yahin rok do taaki FFmpeg crash na ho
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "🔥 FATAL ERROR: YOUTUBE_KEY is missing! GitHub Repo ki Settings > Secrets mein jaake add kar!"
            exit 1
          fi
          
          chmod +x stream.sh
          ./stream.sh
